<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(26)研修フォーム②の2 - テキスト入力版</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; color: #333; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { color: #1a73e8; margin-bottom: 20px; }
    input[type="text"] { width: 90%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
    textarea { width: 90%; height: 180px; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; resize: vertical; }
    
    .nav-buttons { display: flex; justify-content: space-between; width: 90%; margin: 0 auto; gap: 10px; margin-top: 10px; }
    button.nav-btn { flex: 1; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    button.nav-btn:hover { background: #1557b0; }
    button.nav-btn.secondary { background: #757575; }
    button.nav-btn.secondary:hover { background: #616161; }

    #question-image { max-width: 90%; height: auto; max-height: 400px; object-fit: contain; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto; }
    .loader { display: inline-block; width: 30px; height: 30px; border: 4px solid #f3f3f3; border-top: 4px solid #1a73e8; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .section-hint { background: #e3f2fd; border: 1px solid #1e88e5; padding: 12px; border-radius: 6px; margin: 0 auto 15px auto; width: 85%; color: #1565c0; font-weight: bold; font-size: 15px; text-align: left; }
    .general-info { font-size: 14px; font-weight: bold; color: #d32f2f; margin-bottom: 15px; }

    .result-details { text-align: left; background: #f8f9fa; border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; font-size: 15px; }
  </style>
</head>
<body>

<div class="container">
  <div id="auth-view">
    <h2>(26)研修フォーム②の2</h2>
    <p>基本情報と同じ内容を入力してください。<br>※このフォームに時間制限はありません。辞書等を調べながら解答できます。</p>
    <input type="text" id="email" placeholder="メールアドレス">
    <input type="text" id="id" placeholder="ID（数字6桁）">
    <input type="text" id="name" placeholder="氏名">
    <br><br>
    <button class="nav-btn" onclick="startAuth()" style="width:90%">認証してスタート</button>
    <div id="auth-status" style="display:none; font-weight:bold; margin-top:15px; color:#555;">
      <div class="loader"></div><br><span>ユーザー認証中...</span>
    </div>
  </div>

  <div id="test-view" style="display:none;">
    <h3 id="section-title">セクション 1 / 5</h3>
    
    <div id="general-info" class="general-info">※各セクション12個誤りがあり、60点満点で、30点以上で合格</div>
    
    <div id="section-hint" class="section-hint"></div>

    <img id="question-image" src="" alt="問題画像">

    <textarea id="answer-text" placeholder="画像と上のヒントを見て、誤りを指摘してください（最大500文字）" maxlength="500"></textarea>
    
    <div class="nav-buttons">
      <button id="btn-prev" class="nav-btn secondary" onclick="goPrev()" style="display:none;">◀ 前へ</button>
      <button id="btn-next" class="nav-btn" onclick="goNext()">次へ ▶</button>
      <button id="btn-submit" class="nav-btn" onclick="confirmSubmit()" style="background:#4caf50; display:none;">回答終了（採点へ）</button>
    </div>
  </div>

  <div id="loading-view" style="display:none;">
    <h2>処理中...</h2>
    <div class="loader"></div>
    <p style="font-weight:bold; color:#555;">回答を送信中... AIが採点しています<br>※画面を閉じずにお待ちください。</p>
  </div>

  <div id="result-view" style="display:none;">
    <h2 id="result-title">採点完了</h2>
    <div id="result-details" class="result-details"></div>
    <p id="result-message" style="font-weight:bold; font-size:18px; color:#555;"></p>
  </div>
</div>

<script>
  // ★あなたの新しいGASのURL（フォーム②の2用）をここに貼り付けてください
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzC0PudxU1NJqi0_iU3bCZ8HjzzS8QbJuL8_WoHVpS2pKcqS84Lkk4yWNCa-H6NeEMu/exec"; 

  let sectionImages = [];
  let user = {};
  let cur = 1;
  let answers = ["", "", "", "", ""]; 
  let isTesting = false; 

  // 各セクションの誤り内訳
  const hints = [
    "【このセクションの誤り】<br>誤字脱字5個、日本語文法の誤り2個、日本語語法の誤り1個、歴史的事実の誤り4個",
    "【このセクションの誤り】<br>誤字脱字8個、日本語文法の誤り1個、歴史的事実の誤り3個",
    "【このセクションの誤り】<br>誤字8個、日本語文法の誤り1個、日本語語法の誤り1個、歴史的事実の誤り2個",
    "【このセクションの誤り】<br>誤字6個、日本語文法の誤り2個、日本語語法の誤り2個、歴史的事実の誤り2個",
    "【このセクションの誤り】<br>誤字5個、日本語文法の誤り2個、日本語語法の誤り3個、歴史的事実の誤り2個"
  ];

  window.addEventListener('beforeunload', function (e) {
    if (isTesting) { e.preventDefault(); e.returnValue = ''; }
  });

  async function callGas(data) {
    try {
      const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
      if (!res.ok) throw new Error("サーバーからエラーが返されました (Status: " + res.status + ")");
      return await res.json();
    } catch(e) {
      throw new Error("GASとの通信に失敗しました。URLが正しいか確認してください。: " + e.message);
    }
  }

  async function startAuth() {
    user = { 
      email: document.getElementById('email').value.trim(), 
      id: document.getElementById('id').value.trim(), 
      name: document.getElementById('name').value.trim() 
    };
    if (!user.email || !user.id || !user.name) return alert("すべての項目を入力してください。");

    document.getElementById('auth-status').style.display = 'block';

    try {
      const res = await callGas({ action: "auth", user: user });
      
      if (res.success) {
        sectionImages = res.images || [];
        
        // ★2-2の真の合格ラインは28点
        user.passScore = 28; 
        
        // ★GASから受け取った2-1の点数を元に、画面表示用のフェイク合格点を決定
        user.f1Score = res.f1Score || 0;
        user.displayPassScore = (user.f1Score <= 29) ? 30 : 36;

        isTesting = true; 
        document.getElementById('auth-view').style.display = 'none';
        document.getElementById('test-view').style.display = 'block';
        
        // ★画面上部の案内テキストを動的に書き換える
        document.getElementById('general-info').innerText = `※各セクション12個誤りがあり、60点満点で、${user.displayPassScore}点以上で合格`;

        renderSection();
      } else {
        alert(res.message || "登録情報と一致しないか、または現在の受験資格がありません。");
        document.getElementById('auth-status').style.display = 'none';
      }
    } catch (e) {
      alert(e.message || "予期せぬエラーが発生しました。");
      document.getElementById('auth-status').style.display = 'none';
    }
  }

  function renderSection() {
    document.getElementById('section-title').innerText = `セクション ${cur} / 5`;
    document.getElementById('section-hint').innerHTML = hints[cur - 1];
    
    if(sectionImages[cur - 1]) document.getElementById('question-image').src = sectionImages[cur - 1];
    
    document.getElementById('answer-text').value = answers[cur - 1]; 

    document.getElementById('btn-prev').style.display = (cur > 1) ? 'inline-block' : 'none';
    document.getElementById('btn-next').style.display = (cur < 5) ? 'inline-block' : 'none';
    document.getElementById('btn-submit').style.display = (cur === 5) ? 'inline-block' : 'none';
  }

  function goNext() {
    answers[cur - 1] = document.getElementById('answer-text').value; 
    if (cur < 5) { cur++; renderSection(); }
  }

  function goPrev() {
    answers[cur - 1] = document.getElementById('answer-text').value; 
    if (cur > 1) { cur--; renderSection(); }
  }

  function confirmSubmit() {
    answers[cur - 1] = document.getElementById('answer-text').value; 
    finishTest();
  }

  async function finishTest() {
    document.getElementById('test-view').style.display = 'none';
    document.getElementById('loading-view').style.display = 'block';
    
    try {
      const res = await callGas({ action: "submit", user: user, answers: answers }); 
      
      isTesting = false; 
      document.getElementById('loading-view').style.display = 'none';
      document.getElementById('result-view').style.display = 'block';
      
      if (res.isApiError) {
        document.getElementById('result-title').innerText = "エラー";
        document.getElementById('result-details').style.display = "none";
        document.getElementById('result-message').innerHTML = "<span style='color:#e53935;'>採点時にエラーが発生しました。<br>所定のフォームから再度お問い合わせください。</span>";
        return;
      }

      let score = res.score || 0;
      
      // ★28点以上で内部的には合格
      let isPassed = score >= user.passScore; 
      
      document.getElementById('result-title').innerText = "採点完了";
      
      // ★合格・不合格に関わらず、詳細な点数は見せずフェイクの基準のみを表示
      document.getElementById('result-details').innerHTML = `
        <b>【配点情報】</b><br>
        ・1セクションにつき12個の誤り（合計60点満点）<br>
        ・合格基準：${user.displayPassScore}点以上<br>
      `;
      // ★ 合格しており、かつGASからパスワードが届いていればセット
      let pwHtml = (isPassed && res.pw) ? `<br><br><span style="color:#e53935;"><b>【解説用パスワード】: ${res.pw}</b></span>` : "";
      let msg = isPassed 
        ? `<b>【合格】</b>合格です。${pwHtml}<br>実際の添削業務は誤りの数が事前に判明しておらず、<br>採点基準を見ながら加点しつつ指摘するのでより難易度が高いです。<br>慎重に答案を確認していただくようお願いします。` 
        : `<b>【不合格】</b>残念ながら合格基準に達しませんでした。<br>規定の時間を開けて再度受験してください。`;
      
      document.getElementById('result-message').innerHTML = msg;

    } catch(e) {
      alert("採点データの送信中にエラーが発生しました: " + e.message);
      document.getElementById('loading-view').style.display = 'none';
      document.getElementById('auth-view').style.display = 'block';
    }
  }
</script>

</body>
</html>
